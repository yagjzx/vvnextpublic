# Domain-based routing rules for sing-box config generation.
# Copy to routing_rules.yaml and customize.
#
# preferred_exit options:
#   residential - route through residential proxy group
#   far         - route through US overlay group (default for overlay traffic)
#   near        - route through nearest near node (direct exit)
# action: direct - bypass proxy entirely

server_routing:
  ai_residential:
    domains:
      - openai.com
      - anthropic.com
      - claude.ai
      - claude.com
      - cursor.sh
      - gemini.google.com
    preferred_exit: residential
    fallback_exit: far

  streaming_us:
    domains:
      - netflix.com
      - disneyplus.com
      - hulu.com
      - hbomax.com
      - max.com
      - peacocktv.com
    preferred_exit: far

  streaming_hk:
    domains:
      - bilibili.com
      - iqiyi.com
    preferred_exit: near

  us_exclusive:
    domains:
      - linkedin.com
      - irs.gov
      - chase.com
      - bankofamerica.com
    preferred_exit: far

  direct_cn:
    domains:
      - baidu.com
      - qq.com
      - taobao.com
      - jd.com
      - weibo.com
      - douyin.com
      - zhihu.com
      - bilibili.com
      - 163.com
      - sohu.com
    action: direct
